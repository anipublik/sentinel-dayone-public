apiVersion: v1
kind: Secret
metadata:
  name: {{ include "sentinel.fullname" . }}-secrets
  labels:
    {{- include "sentinel.labels" . | nindent 4 }}
type: Opaque
stringData:
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | quote }}
  OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | quote }}
  CATALOG_SOURCE: {{ .Values.catalog.source | quote }}
  WORKDAY_CLIENT_ID: {{ .Values.secrets.workdayClientId | quote }}
  WORKDAY_CLIENT_SECRET: {{ .Values.secrets.workdayClientSecret | quote }}
  WORKDAY_TENANT_URL: {{ .Values.secrets.workdayTenantUrl | quote }}
  SNOW_INSTANCE_URL: {{ .Values.secrets.snowInstanceUrl | quote }}
  SNOW_USERNAME: {{ .Values.secrets.snowUsername | quote }}
  SNOW_PASSWORD: {{ .Values.secrets.snowPassword | quote }}
  BAMBOOHR_SUBDOMAIN: {{ .Values.secrets.bamboohrSubdomain | quote }}
  BAMBOOHR_API_KEY: {{ .Values.secrets.bamboohrApiKey | quote }}
  GITHUB_TOKEN: {{ .Values.secrets.githubToken | quote }}
  GITHUB_ORG: {{ .Values.secrets.githubOrg | quote }}
  GITHUB_WEBHOOK_SECRET: {{ .Values.secrets.githubWebhookSecret | quote }}
  SLACK_BOT_TOKEN: {{ .Values.secrets.slackBotToken | quote }}
  SLACK_WEBHOOK_SECRET: {{ .Values.secrets.slackWebhookSecret | quote }}
  LINEAR_API_KEY: {{ .Values.secrets.linearApiKey | quote }}
  LINEAR_WEBHOOK_SECRET: {{ .Values.secrets.linearWebhookSecret | quote }}
  CONFLUENCE_URL: {{ .Values.secrets.confluenceUrl | quote }}
  CONFLUENCE_USER: {{ .Values.secrets.confluenceUser | quote }}
  CONFLUENCE_API_TOKEN: {{ .Values.secrets.confluenceApiToken | quote }}
  VAULT_ADDR: {{ .Values.secrets.vaultAddr | quote }}
  VAULT_TOKEN: {{ .Values.secrets.vaultToken | quote }}
  GRAFANA_URL: {{ .Values.secrets.grafanaUrl | quote }}
  GRAFANA_ADMIN_TOKEN: {{ .Values.secrets.grafanaAdminToken | quote }}
  NEO4J_PASSWORD: {{ .Values.neo4j.password | quote }}
